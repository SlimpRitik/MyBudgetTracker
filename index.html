<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1B2D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<title>Budget Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0F1B2D;
    --card:     #1C2B3A;
    --card2:    #243447;
    --indigo:   #3D5AFE;
    --indigo2:  #536DFE;
    --green:    #00C896;
    --green-bg: #00C89622;
    --red:      #FF4F5E;
    --red-bg:   #FF4F5E22;
    --slate:    #8892A4;
    --text:     #E8EDF5;
    --sub:      #B0BAC8;
    --border:   #2A3D52;
    --radius:   16px;
    --nav-h:    66px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; min-height: 100dvh; padding-bottom: var(--nav-h); }
  .screen.active { display: flex; }

  /* ── Header ── */
  .header {
    padding: 52px 20px 16px;
    background: linear-gradient(180deg, #162236 0%, var(--bg) 100%);
    position: sticky; top: 0; z-index: 10;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header .sub { font-size: 13px; color: var(--slate); margin-top: 2px; }

  /* ── Month Nav ── */
  .month-nav {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border-radius: 12px;
    padding: 6px 10px;
  }
  .month-nav span { font-size: 14px; font-weight: 600; min-width: 110px; text-align: center; }
  .icon-btn {
    background: none; border: none; color: var(--sub);
    cursor: pointer; padding: 4px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  .icon-btn:active { background: var(--card2); color: var(--text); }
  .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Scroll body ── */
  .scroll-body { flex: 1; overflow-y: auto; padding: 16px 20px 8px; display: flex; flex-direction: column; gap: 14px; }

  /* ── Balance Card ── */
  .balance-card {
    background: linear-gradient(135deg, #1E3A5F 0%, #162A45 100%);
    border: 1px solid #2A4A6A;
    border-radius: var(--radius);
    padding: 20px;
    position: relative; overflow: hidden;
  }
  .balance-card::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle, #3D5AFE18, transparent 70%);
  }
  .balance-label { font-size: 12px; font-weight: 600; color: var(--slate); letter-spacing: .8px; text-transform: uppercase; }
  .balance-amount { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; margin: 6px 0 16px; color: var(--text); }
  .balance-amount.positive { color: var(--green); }
  .balance-amount.negative { color: var(--red); }

  /* flow bar */
  .flow-bar-wrap { display: flex; gap: 4px; height: 6px; border-radius: 4px; overflow: hidden; background: var(--border); }
  .flow-bar-income { background: var(--green); border-radius: 4px 0 0 4px; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .flow-bar-expense { background: var(--red); border-radius: 0 4px 4px 0; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .flow-labels { display: flex; justify-content: space-between; margin-top: 8px; }
  .flow-labels span { font-size: 11px; color: var(--slate); }

  /* ── Summary Tiles ── */
  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tile { background: var(--card); border-radius: var(--radius); padding: 16px; }
  .tile-label { font-size: 11px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--slate); margin-bottom: 6px; }
  .tile-amount { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .tile-amount.green { color: var(--green); }
  .tile-amount.red { color: var(--red); }
  .tile-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 16px; }
  .tile-icon.g { background: var(--green-bg); }
  .tile-icon.r { background: var(--red-bg); }

  /* ── Section heading ── */
  .section-head { display: flex; align-items: center; justify-content: space-between; }
  .section-head h2 { font-size: 15px; font-weight: 700; }
  .section-head button { background: none; border: none; color: var(--indigo2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

  /* ── Transaction List ── */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    background: var(--card); border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .tx-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .tx-icon.income-icon { background: var(--green-bg); }
  .tx-icon.expense-icon { background: var(--red-bg); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-cat { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-note { font-size: 12px; color: var(--slate); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-right { text-align: right; flex-shrink: 0; }
  .tx-amount { font-size: 15px; font-weight: 700; }
  .tx-amount.green { color: var(--green); }
  .tx-amount.red { color: var(--red); }
  .tx-date { font-size: 11px; color: var(--slate); margin-top: 2px; }

  .empty-state { text-align: center; padding: 32px 0; color: var(--slate); }
  .empty-state .emoji { font-size: 36px; display: block; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    height: var(--nav-h);
    background: #162236;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; padding: 8px 20px;
    color: var(--slate); transition: color .15s; font-family: inherit;
  }
  .nav-item.active { color: var(--indigo2); }
  .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-item span { font-size: 10px; font-weight: 600; letter-spacing: .3px; }

  /* ── FAB (Add screen trigger from home) ── */
  .fab {
    position: fixed; bottom: calc(var(--nav-h) + 16px); right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--indigo); border: none; color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 20px #3D5AFE55;
    transition: transform .15s, box-shadow .15s;
    z-index: 50;
  }
  .fab:active { transform: scale(0.93); box-shadow: 0 2px 8px #3D5AFE44; }
  .fab svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; }

  /* ── ADD SCREEN ── */
  .add-header { padding: 52px 20px 16px; background: linear-gradient(180deg, #162236 0%, var(--bg) 100%); }
  .add-header h1 { font-size: 22px; font-weight: 800; }

  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: var(--card); border-radius: 12px; padding: 6px; }
  .type-btn {
    padding: 10px; border: none; border-radius: 8px; font-family: inherit;
    font-size: 14px; font-weight: 700; cursor: pointer;
    background: transparent; color: var(--slate); transition: all .2s;
  }
  .type-btn.active-expense { background: var(--red); color: #fff; }
  .type-btn.active-income  { background: var(--green); color: #fff; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--slate); letter-spacing: .5px; text-transform: uppercase; }
  .form-input {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: inherit; font-size: 16px; padding: 14px 16px;
    outline: none; transition: border-color .15s; width: 100%;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--indigo); }
  .form-input::placeholder { color: var(--slate); }
  .form-input.amount-input { font-size: 28px; font-weight: 800; letter-spacing: -1px; }

  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-chip {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 600;
    cursor: pointer; color: var(--sub); transition: all .15s; user-select: none;
    line-height: 1.4;
  }
  .cat-chip:active { transform: scale(0.96); }
  .cat-chip.selected-expense { border-color: var(--red); background: var(--red-bg); color: var(--text); }
  .cat-chip.selected-income  { border-color: var(--green); background: var(--green-bg); color: var(--text); }
  .cat-chip .cat-emoji { font-size: 18px; display: block; margin-bottom: 2px; }

  .save-btn {
    background: var(--indigo); color: #fff; border: none; border-radius: 14px;
    padding: 16px; font-family: inherit; font-size: 16px; font-weight: 700;
    cursor: pointer; width: 100%; transition: opacity .15s, transform .15s;
    letter-spacing: .2px;
  }
  .save-btn:active { opacity: .85; transform: scale(0.98); }
  .save-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── HISTORY SCREEN ── */
  .filter-tabs { display: flex; gap: 8px; }
  .filter-tab {
    padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border);
    background: transparent; color: var(--slate); font-family: inherit;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .filter-tab.active { background: var(--indigo); border-color: var(--indigo); color: #fff; }

  .del-btn {
    background: none; border: none; cursor: pointer; padding: 6px;
    color: var(--slate); border-radius: 8px; transition: color .15s, background .15s;
    flex-shrink: 0;
  }
  .del-btn:active { color: var(--red); background: var(--red-bg); }
  .del-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%; transform: translateX(-50%) translateY(20px);
    background: #243447; color: var(--text); padding: 12px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: all .3s;
    white-space: nowrap; z-index: 200; pointer-events: none;
    border: 1px solid var(--border);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: #0008; z-index: 300;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px 40px;
    width: 100%; max-width: 480px;
    transform: translateY(40px); transition: transform .25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: var(--sub); margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 14px; border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: var(--card2); color: var(--text); }
  .btn-delete { background: var(--red); color: #fff; }
</style>
</head>
<body>

<!-- ── HOME ─────────────────────────────────────────── -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="header-row">
      <div>
        <h1>Budget Tracker</h1>
        <div class="sub" id="home-greeting">Good morning</div>
      </div>
      <div class="month-nav">
        <button class="icon-btn" onclick="changeMonth(-1,'home')">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="home-month-label">June 2025</span>
        <button class="icon-btn" onclick="changeMonth(1,'home')">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="scroll-body">
    <!-- Balance -->
    <div class="balance-card">
      <div class="balance-label">Net Balance</div>
      <div class="balance-amount" id="home-balance">KES 0</div>
      <div class="flow-bar-wrap">
        <div class="flow-bar-income" id="flow-income" style="width:50%"></div>
        <div class="flow-bar-expense" id="flow-expense" style="width:50%"></div>
      </div>
      <div class="flow-labels">
        <span>Income</span>
        <span>Expense</span>
      </div>
    </div>

    <!-- Tiles -->
    <div class="tiles">
      <div class="tile">
        <div class="tile-icon g">💰</div>
        <div class="tile-label">Income</div>
        <div class="tile-amount green" id="home-income">KES 0</div>
      </div>
      <div class="tile">
        <div class="tile-icon r">💸</div>
        <div class="tile-label">Expenses</div>
        <div class="tile-amount red" id="home-expense">KES 0</div>
      </div>
    </div>

    <!-- Recent -->
    <div class="section-head">
      <h2>Recent</h2>
      <button onclick="showScreen('history')">See all</button>
    </div>
    <div class="tx-list" id="home-recent"></div>
  </div>

  <button class="fab" onclick="showScreen('add')">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- ── ADD ──────────────────────────────────────────── -->
<div id="screen-add" class="screen">
  <div class="add-header">
    <h1>Add Transaction</h1>
  </div>
  <div class="scroll-body" style="gap:18px">
    <!-- Type -->
    <div class="type-toggle">
      <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">Expense</button>
      <button class="type-btn" id="btn-income" onclick="setType('income')">Income</button>
    </div>

    <!-- Amount -->
    <div class="form-group">
      <label class="form-label">Amount (KES)</label>
      <input id="add-amount" class="form-input amount-input" type="number" inputmode="decimal" placeholder="0.00" min="0" step="any">
    </div>

    <!-- Category -->
    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <!-- Date -->
    <div class="form-group">
      <label class="form-label">Date</label>
      <input id="add-date" class="form-input" type="date">
    </div>

    <!-- Note -->
    <div class="form-group">
      <label class="form-label">Note (optional)</label>
      <input id="add-note" class="form-input" type="text" placeholder="What was this for?">
    </div>

    <button class="save-btn" onclick="saveTransaction()">Save Transaction</button>
  </div>
</div>

<!-- ── HISTORY ───────────────────────────────────────── -->
<div id="screen-history" class="screen">
  <div class="header">
    <div class="header-row">
      <h1>History</h1>
      <div class="month-nav">
        <button class="icon-btn" onclick="changeMonth(-1,'history')">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="hist-month-label">June 2025</span>
        <button class="icon-btn" onclick="changeMonth(1,'history')">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
    <div style="margin-top:12px">
      <div class="filter-tabs">
        <button class="filter-tab active" data-f="all" onclick="setFilter('all')">All</button>
        <button class="filter-tab" data-f="income" onclick="setFilter('income')">Income</button>
        <button class="filter-tab" data-f="expense" onclick="setFilter('expense')">Expense</button>
      </div>
    </div>
  </div>
  <div class="scroll-body">
    <div class="tx-list" id="hist-list"></div>
  </div>
</div>

<!-- ── Bottom Nav ── -->
<nav class="bottom-nav">
  <button class="nav-item active" data-screen="home" onclick="showScreen('home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-item" data-screen="add" onclick="showScreen('add')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span>Add</span>
  </button>
  <button class="nav-item" data-screen="history" onclick="showScreen('history')">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <span>History</span>
  </button>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Delete Modal -->
<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <h3>Delete Transaction</h3>
    <p>This record will be permanently removed.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDelModal()">Cancel</button>
      <button class="btn-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const EXPENSE_CATS = [
  {e:"🏠",l:"Housing"},{e:"🍔",l:"Food"},{e:"🚗",l:"Transport"},
  {e:"💊",l:"Health"},{e:"👕",l:"Clothing"},{e:"📱",l:"Utilities"},
  {e:"🎬",l:"Fun"},{e:"📚",l:"Education"},{e:"🛒",l:"Shopping"},
  {e:"💰",l:"Savings"},{e:"🔧",l:"Repairs"},{e:"📦",l:"Other"}
];
const INCOME_CATS = [
  {e:"💼",l:"Salary"},{e:"🏦",l:"Freelance"},{e:"📈",l:"Investment"},
  {e:"🏠",l:"Rental"},{e:"🎁",l:"Gift"},{e:"💳",l:"Refund"},
  {e:"🛍️",l:"Business"},{e:"📦",l:"Other"}
];

function loadData()  { try { return JSON.parse(localStorage.getItem('bt_data')||'{"txs":[]}'); } catch(e){ return {txs:[]}; } }
function saveData(d) { localStorage.setItem('bt_data', JSON.stringify(d)); }

let DB = loadData();
let currentMonth = new Date().toISOString().slice(0,7); // "YYYY-MM"
let addType = 'expense';
let addCat  = '';
let filterType = 'all';
let pendingDeleteId = null;

// ── Screens ───────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.screen === name));
  if (name === 'home')    renderHome();
  if (name === 'add')     initAdd();
  if (name === 'history') renderHistory();
  window.scrollTo(0,0);
}

// ── Month Nav ─────────────────────────────────────────────────────────────
function changeMonth(dir, screen) {
  const [y, m] = currentMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + dir, 1);
  currentMonth = d.toISOString().slice(0,7);
  if (screen === 'home')    renderHome();
  if (screen === 'history') renderHistory();
}

function monthLabel(ym) {
  return new Date(ym + '-15').toLocaleDateString('en-KE', {month:'long', year:'numeric'});
}

// ── Home ──────────────────────────────────────────────────────────────────
function renderHome() {
  document.getElementById('home-month-label').textContent = monthLabel(currentMonth);
  const txs = DB.txs.filter(t => t.date.startsWith(currentMonth));
  const income  = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;

  const balEl = document.getElementById('home-balance');
  balEl.textContent = 'KES ' + fmt(Math.abs(balance));
  balEl.className = 'balance-amount ' + (balance >= 0 ? 'positive' : 'negative');

  document.getElementById('home-income').textContent  = 'KES ' + fmt(income);
  document.getElementById('home-expense').textContent = 'KES ' + fmt(expense);

  const total = income + expense || 1;
  document.getElementById('flow-income').style.width  = (income/total*100)  + '%';
  document.getElementById('flow-expense').style.width = (expense/total*100) + '%';

  const h = document.getElementById('home-greeting');
  const hr = new Date().getHours();
  h.textContent = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';

  const recent = [...txs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const el = document.getElementById('home-recent');
  el.innerHTML = '';
  if (!recent.length) { el.innerHTML = '<div class="empty-state"><span class="emoji">📭</span><p>No transactions this month</p></div>'; return; }
  recent.forEach(t => el.appendChild(txCard(t, false)));
}

// ── History ───────────────────────────────────────────────────────────────
function renderHistory() {
  document.getElementById('hist-month-label').textContent = monthLabel(currentMonth);
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.toggle('active', b.dataset.f === filterType));
  let txs = DB.txs.filter(t => t.date.startsWith(currentMonth));
  if (filterType !== 'all') txs = txs.filter(t => t.type === filterType);
  txs.sort((a,b) => b.date.localeCompare(a.date));
  const el = document.getElementById('hist-list');
  el.innerHTML = '';
  if (!txs.length) { el.innerHTML = '<div class="empty-state"><span class="emoji">🔍</span><p>No records found</p></div>'; return; }
  txs.forEach(t => el.appendChild(txCard(t, true)));
}

function setFilter(f) { filterType = f; renderHistory(); }

// ── Transaction Card ──────────────────────────────────────────────────────
function txCard(t, showDel) {
  const inc = t.type === 'income';
  const div = document.createElement('div');
  div.className = 'tx-item';
  div.innerHTML = `
    <div class="tx-icon ${inc?'income-icon':'expense-icon'}">${t.emoji||'💳'}</div>
    <div class="tx-info">
      <div class="tx-cat">${t.category}</div>
      <div class="tx-note">${t.note || t.date}</div>
    </div>
    <div class="tx-right">
      <div class="tx-amount ${inc?'green':'red'}">${inc?'+':'-'}KES ${fmt(t.amount)}</div>
      <div class="tx-date">${t.date}</div>
    </div>
    ${showDel ? `<button class="del-btn" onclick="openDelModal(${t.id})">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </button>` : ''}
  `;
  return div;
}

// ── Add ───────────────────────────────────────────────────────────────────
function initAdd() {
  addType = 'expense';
  addCat  = '';
  document.getElementById('add-amount').value = '';
  document.getElementById('add-note').value   = '';
  document.getElementById('add-date').value   = new Date().toISOString().slice(0,10);
  updateTypeUI();
  buildCatGrid();
}

function setType(t) { addType = t; addCat = ''; updateTypeUI(); buildCatGrid(); }

function updateTypeUI() {
  document.getElementById('btn-expense').className = 'type-btn' + (addType==='expense'?' active-expense':'');
  document.getElementById('btn-income').className  = 'type-btn' + (addType==='income' ?' active-income':'');
}

function buildCatGrid() {
  const cats = addType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  cats.forEach(c => {
    const el = document.createElement('div');
    el.className = 'cat-chip';
    el.innerHTML = `<span class="cat-emoji">${c.e}</span>${c.l}`;
    el.onclick = () => selectCat(c, el);
    grid.appendChild(el);
  });
}

function selectCat(c, el) {
  addCat = c.l; addEmoji = c.e;
  document.querySelectorAll('.cat-chip').forEach(x => x.classList.remove('selected-expense','selected-income'));
  el.classList.add('selected-' + addType);
}

let addEmoji = '💳';

function saveTransaction() {
  const amount = parseFloat(document.getElementById('add-amount').value);
  const date   = document.getElementById('add-date').value;
  const note   = document.getElementById('add-note').value.trim();
  if (!amount || amount <= 0) { showToast('Enter a valid amount'); return; }
  if (!addCat)                { showToast('Pick a category'); return; }
  if (!date)                  { showToast('Select a date'); return; }
  const tx = { id: Date.now(), type: addType, amount, category: addCat, emoji: addEmoji, note, date };
  DB.txs.push(tx);
  saveData(DB);
  showToast('Saved ✓');
  setTimeout(() => showScreen('home'), 600);
}

// ── Delete ────────────────────────────────────────────────────────────────
function openDelModal(id) { pendingDeleteId = id; document.getElementById('del-modal').classList.add('open'); }
function closeDelModal()  { document.getElementById('del-modal').classList.remove('open'); }
function confirmDelete() {
  DB.txs = DB.txs.filter(t => t.id !== pendingDeleteId);
  saveData(DB);
  closeDelModal();
  renderHistory();
  showToast('Deleted');
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Format ────────────────────────────────────────────────────────────────
function fmt(n) {
  return n.toLocaleString('en-KE', {minimumFractionDigits:0, maximumFractionDigits:0});
}

// ── Init ──────────────────────────────────────────────────────────────────
renderHome();
initAdd();

// Close modal on overlay click
document.getElementById('del-modal').addEventListener('click', function(e) {
  if (e.target === this) closeDelModal();
});
</script>

  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});

link.rel = 'manifest'; link.href = url;

</script>

<!-- Service Worker for offline -->
<script>
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'budget-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
